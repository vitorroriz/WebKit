<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            font-size: 12pt;
        }

        .container {
            border: 4px solid black;
            margin: 10px;
            padding: 4px;
            text-align: center;
            print-color-adjust: economy;
        }

        /* White text on black: should darken to be legible on white */
        .white-on-black {
            color: white;
            background-color: black;
        }

        /* Light gray on dark gray */
        .lightgray-on-darkgray {
            color: #ccc;
            background-color: #333;
        }

        /* Light blue on dark blue */
        .lightblue-on-darkblue {
            color: #aaccff;
            background-color: #002;
        }

        /* Medium gray: just below 0.5 luminance threshold, not legible
           on white when lightened, so should be darkened */
        .medium-gray {
            color: #999;
            background-color: #222;
        }
    </style>
    <script>
        if (window.internals)
            internals.setPrinting(600, 600);
    </script>
</head>
<body>
    <p>Light text on dark backgrounds with print-color-adjust: economy. All text
    should be darkened to be legible against a white background.</p>

    <div class="container white-on-black">
        White on black
    </div>

    <div class="container lightgray-on-darkgray">
        Light gray on dark gray
    </div>

    <div class="container lightblue-on-darkblue">
        Light blue on dark blue
    </div>

    <div class="container medium-gray">
        Medium gray
    </div>
</body>
</html>
