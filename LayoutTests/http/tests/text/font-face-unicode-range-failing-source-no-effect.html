<!DOCTYPE html>
<!-- Test: When a @font-face family contains both a valid and a failing source
     for different unicode-range segments, the character served by the valid
     source must render correctly after fonts settle.

     Spec: CSS Fonts 4, Section 4.5 "unicode-range"
     https://www.w3.org/TR/css-fonts-4/#descdef-font-face-unicode-range

     Difference from reference: the test has a failing @font-face source for
     U+0042, the reference does not. Rendering of "A" (U+0041) must be identical. -->
<html>
<head>
<script>
if (window.testRunner)
    testRunner.waitUntilDone();
if (window.internals) {
    internals.invalidateFontCache();
    internals.clearMemoryCache();
}
</script>
<style>
@font-face {
  font-family: "WebFont";
  src: url("resources/Gulf-regular.ttf");
  unicode-range: U+0041;
}
@font-face {
  font-family: "WebFont";
  src: url("resources/thisisnotarealfont.ttf");
  unicode-range: U+0042;
}
</style>
</head>
<body>
<span style="font: 100px 'WebFont', Helvetica; line-height: 1;">&#x0041;</span>
<script>
document.fonts.load("100px WebFont", "A").then(() => {
    requestAnimationFrame(() => {
        requestAnimationFrame(() => {
            if (window.testRunner)
                testRunner.notifyDone();
        });
    });
});
</script>
</body>
</html>
