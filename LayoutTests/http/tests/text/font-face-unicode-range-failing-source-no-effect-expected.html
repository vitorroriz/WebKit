<!DOCTYPE html>
<!-- Reference: Same layout as the test, but with valid font sources for both
     unicode-range segments. The "A" (U+0041) character must render identically
     to the test, where the U+0042 source is invalid. -->
<html>
<head>
<script>
if (window.testRunner)
    testRunner.waitUntilDone();
if (window.internals) {
    internals.invalidateFontCache();
    internals.clearMemoryCache();
}
</script>
<style>
@font-face {
  font-family: "WebFont";
  src: url("resources/Gulf-regular.ttf");
  unicode-range: U+0041;
}
@font-face {
  font-family: "WebFont";
  src: url("resources/Gulf-regular.ttf");
  unicode-range: U+0042;
}
</style>
</head>
<body>
<span style="font: 100px 'WebFont', Helvetica; line-height: 1;">&#x0041;</span>
<script>
document.fonts.load("100px WebFont", "A").then(() => {
    requestAnimationFrame(() => {
        requestAnimationFrame(() => {
            if (window.testRunner)
                testRunner.notifyDone();
        });
    });
});
</script>
</body>
</html>
