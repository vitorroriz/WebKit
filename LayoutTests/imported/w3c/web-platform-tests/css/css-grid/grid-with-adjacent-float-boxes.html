<!DOCTYPE html>
<link rel="match" href="grid-with-adjacent-float-boxes-ref.html">
<meta name="assert" content="Tests that the grid container avoids floats.">
<style>
.container {
  width: 250px;
  background-color: white;
}

div {
  background-color: blue;
  height: 100px;
  width: 50px;
}

.float_box {
  clear: right;
  float: right;
  height: 50px;
}

.grid {
  display: grid;
  background-color: green;
  width: auto;
}
</style>
<pre>PASS if blue and green boxes do not overlap each other.</pre>
<div class=container>
  <div class=float_box></div>
  <div class=float_box style="width: 200px"></div>
  <div class=grid></div>
</div>
<div class=container>
  <div class=float_box></div>
  <div class=float_box style="width: 200px"></div>
  <div class=grid style="display: grid-lanes"></div>
</div>
