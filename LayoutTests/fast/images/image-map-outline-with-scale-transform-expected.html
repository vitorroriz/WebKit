<!DOCTYPE html>
<html>
<head>
<title>This tests that we paint area outline properly when the image's container is scaled.</title>
<style>
.container {
  transform: scale(2);
  position: absolute;
  left: 50px;
  top: 50px;
}
.outline {
  position: absolute;
  top: 5px;
  left: 5px;
  width: 20px;
  height: 20px;
  outline: auto;
}
</style>
</head>
<body>
<div class="container">
  <img src="./resources/green.jpg" width=50 height=50>
  <div class="outline"></div>
</div>
</body>
</html>
